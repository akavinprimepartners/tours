<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Akavin | 360° Tour & Visual Gallery</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Pannellum - Reliable 360° panorama viewer -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f2f6fa;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Loading spinner */
        .loading-spinner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #f4a261;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            z-index: 1000;
            display: none;
            pointer-events: none;
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* MAIN FLEX LAYOUT */
        .main-layout {
            display: flex;
            flex: 1;
            height: 100vh;
            overflow: hidden;
        }

        /* Left panel */
        .client-panel {
            width: 300px;
            background: #ffffff;
            border-right: 1px solid #e2e9f2;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 10;
        }

        .panel-header {
            padding: 24px 20px 12px 24px;
            border-bottom: 1px solid #eef2f8;
            display: flex;
            align-items: center;
            gap: 14px;
            background: white;
        }
        .logo-inline img {
            height: 42px;
            width: auto;
            max-width: 150px;
            object-fit: contain;
        }
        .projects-title {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #2c5a7a;
            background: #ecf3f9;
            padding: 6px 14px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .projects-title i { color: #f4a261; }

        .client-list-container {
            padding: 20px 16px 24px 20px;
            flex: 1;
        }
        .client-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .client-card {
            background: #f9fbfe;
            border-radius: 20px;
            padding: 14px 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 14px;
            font-weight: 600;
            color: #1f4468;
            border: 1px solid #eef3fc;
        }
        .client-card i {
            font-size: 1.3rem;
            width: 32px;
            color: #f4a261;
        }
        .client-card:hover {
            background: #eef3fa;
            transform: translateX(6px);
        }
        .client-card.active {
            background: #1e4663;
            color: white;
            border-color: #1e4663;
        }
        .client-card.active i { color: #ffe0a3; }

        /* Right area */
        .right-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #fefefe;
        }

        /* Ribbon section */
        .ribbon-section {
            background: #ffffff;
            border-bottom: 1px solid #e5edf5;
            padding: 12px 20px 10px 20px;
            flex-shrink: 0;
        }
        .ribbon-label {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .ribbon-label h4 {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #4a6f8f;
        }
        .image-ribbon {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: thin;
        }
        .image-ribbon::-webkit-scrollbar { height: 5px; }
        .thumb-item {
            flex: 0 0 auto;
            width: 85px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        .thumb-item:hover { transform: translateY(-4px); }
        .thumb-icon {
            width: 75px;
            height: 75px;
            border-radius: 18px;
            object-fit: cover;
            background: #eef2f9;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            border: 2px solid white;
        }
        .thumb-item span {
            display: block;
            font-size: 0.62rem;
            margin-top: 6px;
            font-weight: 500;
            color: #2c5a7a;
            background: #f0f4f9;
            padding: 2px 6px;
            border-radius: 40px;
        }
        .no-ribbon-msg {
            color: #859dae;
            font-size: 0.85rem;
            padding: 18px 0;
            text-align: center;
        }

        /* Tour viewer with Pannellum */
        .tour-viewer {
            flex: 1;
            background: #0c1218;
            position: relative;
            min-height: 0;
            border-radius: 16px;
            overflow: hidden;
            margin: 6px 16px 16px 16px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.2);
        }
        #panorama {
            width: 100%;
            height: 100%;
            background: #000;
        }
        .tour-label-badge {
            position: absolute;
            top: 14px;
            left: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
            font-size: 0.75rem;
            font-weight: 500;
            pointer-events: none;
        }
        .instruction-hint {
            position: absolute;
            bottom: 14px;
            right: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 20px;
            color: #f4a261;
            font-size: 0.7rem;
            pointer-events: none;
        }
        .status-bar {
            position: absolute;
            bottom: 14px;
            left: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 20px;
            color: #4caf50;
            font-size: 0.7rem;
            pointer-events: none;
        }
        .iframe-embed {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 800px) {
            .client-panel { width: 260px; }
        }
        @media (max-width: 650px) {
            .main-layout { flex-direction: column; }
            .client-panel { width: 100%; max-height: 200px; }
        }
    </style>
</head>
<body>

<div class="main-layout">
    <!-- Left Column -->
    <div class="client-panel">
        <div class="panel-header">
            <div class="logo-inline">
                <img src="https://www.akavin.online/logo.png" alt="Akavin Logo" onerror="this.src='https://placehold.co/160x45?text=Akavin';">
            </div>
            <div class="projects-title">
                <i class="fas fa-layer-group"></i> PROJECTS
            </div>
        </div>
        <div class="client-list-container">
            <div class="client-list" id="clientList">
                <div class="client-card active" data-client="besant">
                    <i class="fas fa-building"></i> Besant Nagar Project 1
                </div>
                <div class="client-card" data-client="sample">
                    <i class="fas fa-folder-tree"></i> Sample
                </div>
            </div>
        </div>
    </div>

    <!-- Right side -->
    <div class="right-area">
        <!-- Ribbon -->
        <div class="ribbon-section">
            <div class="ribbon-label">
                <i class="fas fa-images"></i>
                <h4 id="ribbonDynamicTitle">GALLERY PREVIEW</h4>
            </div>
            <div id="imageRibbon" class="image-ribbon">
                <div class="no-ribbon-msg">✨ Select a project to view images</div>
            </div>
        </div>

        <!-- Tour viewer -->
        <div class="tour-viewer">
            <div class="tour-label-badge" id="tourBadge">🎯 360° Immersive View</div>
            <div class="instruction-hint">🖱️ Drag to rotate • Scroll to zoom</div>
            <div class="status-bar" id="statusMsg">🎮 Loading panorama...</div>
            <div id="panorama"></div>
        </div>
    </div>
</div>

<div class="loading-spinner" id="spinner"></div>

<script>
    // Pannellum viewer instance
    let pannellumViewer = null;
    let activeClientId = 'besant';
    
    // Working demo panorama (reliable public test image)
    const WORKING_PANO = "https://raw.githubusercontent.com/marzipano/marzipano/master/data/example/kitchen.jpg";
    
    const projectData = {
        besant: {
            name: "Besant Nagar Project 1",
            imageList: [
                "assets/evolve/B0.jpeg",
                "assets/evolve/B1.jpeg",
                "assets/evolve/B2.jpeg",
                "assets/evolve/B3.jpeg",
                "assets/evolve/B4.jpeg",
                "assets/evolve/B5.jpeg"
            ],
            tourType: "pannellum",
            // YOUR CUSTOM PANORAMA - change this path when you have your image
            tourResource: "assets/evolve/tour360.jpg",
            fallbackResource: WORKING_PANO
        },
        sample: {
            name: "Sample Project",
            imageList: [
                "assets/Sample/0.JPG",
                "assets/Sample/1.JPG",
                "assets/Sample/2.JPG",
                "assets/Sample/3.JPG",
                "assets/Sample/4.JPG",
                "assets/Sample/5.JPG"
            ],
            tourType: "kuula",
            tourResource: "https://kuula.co/share/5RD8f"
        }
    };

    // DOM elements
    const clientItems = document.querySelectorAll('.client-card');
    const ribbonContainer = document.getElementById('imageRibbon');
    const ribbonTitle = document.getElementById('ribbonDynamicTitle');
    const panoContainer = document.getElementById('panorama');
    const tourBadge = document.getElementById('tourBadge');
    const statusMsg = document.getElementById('statusMsg');
    const spinner = document.getElementById('spinner');

    // Show/hide spinner
    function showSpinner() {
        spinner.style.display = 'block';
    }
    function hideSpinner() {
        spinner.style.display = 'none';
    }

    // Destroy existing viewer
    function destroyViewer() {
        if (pannellumViewer) {
            try {
                pannellumViewer.destroy();
            } catch(e) { console.warn(e); }
            pannellumViewer = null;
        }
        // Clear container
        while (panoContainer.firstChild) {
            panoContainer.removeChild(panoContainer.firstChild);
        }
    }

    // Initialize Pannellum with panorama image
    function initPannellum(imageUrl, isDemo = false) {
        return new Promise((resolve, reject) => {
            try {
                destroyViewer();
                showSpinner();
                
                // Test if image exists and is accessible
                const testImg = new Image();
                testImg.onload = () => {
                    try {
                        pannellumViewer = pannellum.viewer('panorama', {
                            type: "equirectangular",
                            panorama: imageUrl,
                            autoLoad: true,
                            showZoomCtrl: true,
                            showFullscreenCtrl: true,
                            compass: true,
                            hotSpotDebug: false,
                            default: {
                                firstScene: true,
                                sceneFadeDuration: 1000
                            }
                        });
                        
                        hideSpinner();
                        
                        if (isDemo) {
                            statusMsg.innerHTML = '⚠️ Using demo panorama • Add your own tour360.jpg to /assets/evolve/';
                            tourBadge.innerHTML = '🎯 DEMO MODE • Working 360° view (Drag to explore)';
                        } else {
                            statusMsg.innerHTML = '✓ Custom panorama loaded successfully!';
                            tourBadge.innerHTML = '🌍 360° VIEW • Besant Nagar Project 1 (Drag to look around)';
                        }
                        resolve();
                    } catch (err) {
                        hideSpinner();
                        console.error("Pannellum init error:", err);
                        reject(err);
                    }
                };
                testImg.onerror = () => {
                    hideSpinner();
                    console.warn(`Image failed to load: ${imageUrl}`);
                    reject(new Error(`Image not found: ${imageUrl}`));
                };
                testImg.src = imageUrl;
            } catch (err) {
                hideSpinner();
                reject(err);
            }
        });
    }

    // Load panorama with fallback
    async function loadPanorama(imageUrl, fallbackUrl, projectName) {
        try {
            await initPannellum(imageUrl, false);
        } catch (err) {
            console.log(`Custom image failed, loading fallback demo...`);
            statusMsg.innerHTML = `⚠️ Could not load ${imageUrl}, showing demo panorama instead`;
            tourBadge.innerHTML = `🎯 Using Demo • Add your panorama to /assets/evolve/tour360.jpg`;
            try {
                await initPannellum(fallbackUrl, true);
            } catch (fallbackErr) {
                console.error("Fallback also failed:", fallbackErr);
                statusMsg.innerHTML = '❌ Error loading any panorama. Please check console.';
                showErrorInContainer();
            }
        }
    }

    // Show error message in container
    function showErrorInContainer() {
        destroyViewer();
        const errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; background:#0c1218; color:#ccc; text-align:center; padding:20px;';
        errorDiv.innerHTML = `
            <i class="fas fa-exclamation-triangle" style="font-size:48px; color:#f4a261; margin-bottom:20px;"></i>
            <h3 style="margin-bottom:8px;">360° Image Failed to Load</h3>
            <p style="margin-bottom:12px;">Could not load panorama from:</p>
            <code style="background:#2a2f35; padding:8px 16px; border-radius:8px; font-size:12px;">assets/evolve/tour360.jpg</code>
            <div style="margin-top:20px; text-align:left; max-width:400px;">
                <p><strong>📁 How to add your own 360° panorama:</strong></p>
                <ul style="margin-top:10px; margin-left:20px;">
                    <li>1. Get an equirectangular 360° photo (2:1 aspect ratio)</li>
                    <li>2. Name it <strong>tour360.jpg</strong></li>
                    <li>3. Place it in: <strong>/assets/evolve/tour360.jpg</strong></li>
                    <li>4. Refresh the page</li>
                </ul>
            </div>
            <button onclick="location.reload()" style="margin-top:25px; background:#f4a261; border:none; padding:10px 30px; border-radius:30px; cursor:pointer; color:#1e4663; font-weight:bold;">
                Retry
            </button>
        `;
        panoContainer.appendChild(errorDiv);
    }

    // Kuula embed
    function showKuulaEmbed(url) {
        destroyViewer();
        const iframe = document.createElement('iframe');
        let embedUrl = url;
        if (url.includes('kuula.co/share/') && !url.includes('embed')) {
            embedUrl = url + (url.includes('?') ? '&embed=1' : '?embed=1');
        }
        iframe.src = embedUrl;
        iframe.className = 'iframe-embed';
        iframe.setAttribute('allowfullscreen', 'true');
        iframe.setAttribute('allow', 'autoplay; gyroscope; accelerometer; fullscreen');
        panoContainer.appendChild(iframe);
        tourBadge.innerHTML = `🎥 KUULA 360° • Interactive Tour`;
        statusMsg.innerHTML = `🎬 Kuula interactive tour | Click and drag to explore`;
    }

    // Load tour based on client
    async function loadTour(clientId) {
        const project = projectData[clientId];
        if (!project) return;
        
        if (project.tourType === 'pannellum') {
            await loadPanorama(project.tourResource, project.fallbackResource, project.name);
        } else if (project.tourType === 'kuula') {
            showKuulaEmbed(project.tourResource);
        }
    }

    // Render ribbon thumbnails
    function renderRibbon(clientId) {
        const project = projectData[clientId];
        if (!project) return;
        
        ribbonTitle.innerHTML = `📸 ${project.name} · ${project.imageList.length} images`;
        const images = project.imageList;
        
        if (!images || images.length === 0) {
            ribbonContainer.innerHTML = `<div class="no-ribbon-msg"><i class="fas fa-exclamation-triangle"></i> No preview images</div>`;
            return;
        }
        
        let ribbonHtml = '';
        images.forEach((imgPath) => {
            let fileName = imgPath.split('/').pop();
            ribbonHtml += `
                <div class="thumb-item" onclick="window.open('${imgPath}', '_blank')">
                    <img class="thumb-icon" src="${imgPath}" alt="${fileName}" loading="lazy" 
                         onerror="this.src='https://placehold.co/200x200?text=Missing';">
                    <span>${fileName.length > 12 ? fileName.slice(0,9)+'..' : fileName}</span>
                </div>
            `;
        });
        ribbonContainer.innerHTML = ribbonHtml;
    }

    // Switch active client
    function switchActiveClient(clientId) {
        activeClientId = clientId;
        clientItems.forEach(item => {
            const itemClient = item.getAttribute('data-client');
            if (itemClient === clientId) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
        
        renderRibbon(clientId);
        loadTour(clientId);
    }

    // Handle window resize
    function handleResize() {
        if (pannellumViewer && typeof pannellumViewer.resize === 'function') {
            setTimeout(() => {
                if (pannellumViewer) pannellumViewer.resize();
            }, 100);
        }
    }

    // Bind client click events
    function bindClientEvents() {
        clientItems.forEach(card => {
            card.addEventListener('click', () => {
                const clientVal = card.getAttribute('data-client');
                if (clientVal && clientVal !== activeClientId) {
                    switchActiveClient(clientVal);
                }
            });
        });
    }

    // Initialize
    function init() {
        bindClientEvents();
        switchActiveClient('besant');
        window.addEventListener('resize', handleResize);
        
        console.log("%c🔍 AKAVIN 360° TOUR - Pannellum Edition", "color: #f4a261; font-size: 16px; font-weight: bold;");
        console.log("%c✨ Using Pannellum - much more reliable 360° viewer", "color: #4caf50;");
        console.log("%c📁 To use your own image:", "color: #f4a261;");
        console.log("%c   Place tour360.jpg in: /assets/evolve/", "color: #fff; background: #1e4663; padding: 2px 6px; border-radius: 4px;");
    }
    
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
